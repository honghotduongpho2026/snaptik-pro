<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTik Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto mt-10 px-4">
        <h1 class="text-3xl font-black text-center text-blue-600 mb-6">SnapTik Pro</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-md flex gap-2 mb-6">
            <input type="text" id="urlInput" placeholder="Dán link vào đây..." class="flex-1 outline-none text-sm">
            <button onclick="analyzeVideo()" id="btnAnalyze" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">TẢI</button>
        </div>

        <div id="resultArea" class="hidden bg-white p-4 rounded-xl shadow-md text-center">
            <img id="vThumb" src="" class="w-full rounded-lg mb-4">
            <p id="vTitle" class="text-sm font-bold mb-4 text-gray-700"></p>
            
            <button id="mainDownloadBtn" onclick="handleDownload()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition">
                <span id="btnText">NHẤN ĐỂ TẢI VIDEO</span>
            </button>
            <p id="timerNote" class="hidden text-[10px] text-red-500 mt-2 font-bold italic">Đang tải, vui lòng không thoát...</p>
        </div>
    </div>

    <script>
        let realVideoUrl = "";
        const shopeeLink = "https://s.shopee.vn/60Nqx2YhkD";

        async function analyzeVideo() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;
            document.getElementById('btnAnalyze').innerText = "...";
            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await res.json();
                if(data.error) return alert(data.error);
                
                document.getElementById('vThumb').src = data.thumbnail;
                document.getElementById('vTitle').innerText = data.title;
                realVideoUrl = data.video_url;
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) { alert("Lỗi kết nối!"); }
            document.getElementById('btnAnalyze').innerText = "TẢI";
        }

        function handleDownload() {
            window.open(shopeeLink, '_blank'); // Mở Shopee
            
            const dBtn = document.getElementById('mainDownloadBtn');
            const dText = document.getElementById('btnText');
            dBtn.disabled = true;
            document.getElementById('timerNote').classList.remove('hidden');

            let sec = 6;
            const timer = setInterval(() => {
                dText.innerText = `ĐANG XỬ LÝ... ${sec}S`;
                sec--;
                if(sec < 0) {
                    clearInterval(timer);
                    dText.innerText = "ĐANG TẢI...";
                    window.location.href = `/download_file?url=${encodeURIComponent(realVideoUrl)}`;
                    setTimeout(() => {
                        dBtn.disabled = false;
                        dText.innerText = "NHẤN ĐỂ TẢI LẠI";
                    }, 3000);
                }
            }, 1000);
        }
    </script>
</body>
</html>
